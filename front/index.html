<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Upload</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="thelionsden">
        <img src="./la creatura.jpg" alt="cat">
    </div>
    <div id="thing">
        <img src="./knocking-on-window-horror-knocking.gif" alt="cat" id="why">
        <p id="close">come closer</p>
    </div>
    <div id="THE-CAGE">
        <img src="./exploding-cat-cat-blowing-up.gif" alt="" id="THE-CREATURE">
    </div>
    <div id="authContainer" class="container">
        <h1>Login</h1>
        <form id="loginForm">
            <input type="text" id="loginUsername" placeholder="Username" required autocomplete="on" minlength="4">
            <input type="password" id="loginPassword" placeholder="Password" required autocomplete="current-password">
            <button type="submit">Login</button>
        </form>
        <p>Don't have an account? <a href="#" id="showRegister">Register</a></p>

        <form id="registerForm" style="display:none;">
            <h1>Register</h1>
            <input type="text" id="regUsername" placeholder="Username" minlength="4" required><!--need to implement checking duplicate usernames-->
            <input type="password" id="regPassword" placeholder="Password" required autocomplete="new-password" minlength="8"
            oninput="val(this)">
            <div id="error"></div>
            <button id="registerbutton" disabled type="submit">Register</button>
        </form>
        <p style="display:none;"><a href="#" id="showLogin">Back to Login</a></p>
        <div id="authMessage" class="message"></div>
    </div>

    <div id="imgCloseUp" style="display:none;">
        <img src="//:0" id="closeUp" style="display:none;">
    </div>

    <div id="uploadContainer" class="container" style="display:none;">
        <button type="button" id="funnybutton">funny button</button>
        <button type="button" id="sync">sync!</button>
        <div class="header-with-logout">
            <h1>File Upload</h1>
            <button type="button" id="logoutBtn">Logout</button>
        </div>
        <div class="main-layout">
            <div class="upload-section">
                <form id="uploadForm" enctype="multipart/form-data">
                    <div class="upload-area">
                        <label for="fileInput" class="file-label">
                            <span class="upload-text">Choose a file or drag it here</span>
                        </label>
                        <input type="file" id="fileInput" name="img" required accept=".jpg, .png, .webp">
                    </div>
                    <label for="method">Method:</label>
                    <select id="method" name="method" required>
                        <option value="kMeans" selected>kMeans</option>
                        <option value="jobtype2">jobtype2</option>
                        <option value="jobtype3">jobtype3</option>
                    </select>
                    <button type="submit" class="upload-btn">Upload File</button>
                </form>
                <button type="button" id="getFilesBtn" class="upload-btn">Get Files</button>
                <div id="message" class="message"></div>
            </div>
            <div class="images-section">
                <h2>Processed Images</h2>
                <div id="imgBox"></div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="auth.js"></script>
    <script src="images.js"></script>
    <script src="upload.js"></script>
    <script src="cat.js"></script>
</body>
</html>
