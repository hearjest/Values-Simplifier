services:

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
      target: dev
    ports:
      - "3000:3000"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SQL_HOST: postgres
      REDIS_HOST: redis
      PORT: 3000
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app #remove for nondev
      - ./temp:/app/temp
    command: npx nodemon back/server.js #remove for nondev
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/checkHealth', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      PYTHONUNBUFFERED: "1"
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT}
      MINIO_HOST: minio
      MINIO_PORT: "9000"
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET1: ${MINIO_BUCKET1:-processed}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      HF_TOKEN: ${HF_TOKEN}
    depends_on:
      - redis
    volumes:
      - .:/app
      - ./temp:/app/temp
      - ./temp2:/app/temp2
    #command: python worker.py #remove the one below for nondev and reenable this
    command: python -m watchfiles "python back/worker/worker2.py" /app/back/worker 
    restart: unless-stopped

  postgres:
    image: postgres:latest
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  redis:
    image: redis:8.4
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

  bgutil:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    ports:
      - "4416:4416"

  
volumes:
  pgdata:
  redisdata:
  temp:
  temp2: