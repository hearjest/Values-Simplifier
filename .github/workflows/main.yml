name: CI/CD and Node.js Application with Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: run playwright
    runs-on: debian-latest

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: hi-postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: $${ secrets.POSTGRES_PASS }}
        options: >-
          --health-cmd "pg_isready -U postgres -d hi-postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:8.4
        options: >-
          --health-cmd "redis-cli ping || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

        ports:
          - 6379:6379
      steps:
        - name: Checkout code
          uses: actions/checkout@v4
      
        - name: Set up Node.js
          uses: actions/setup-node@v4
          with:
            node-version: 22
            cache: npm
      
        - name: Install dependencies
          run: npm ci
      
        - name: Start MinIO
          run: |
            docker run -d --name minio \
              -p 9000:9000 -p 9001:9001 \
              -e MINIO_ROOT_USER="${{ secrets.MINIO_ROOT_USER }}" \
              -e MINIO_ROOT_PASSWORD="${{ secrets.MINIO_ROOT_PASSWORD }}" \
              minio/minio:latest server /data --console-address ":9001"
      
        - name: Wait for MinIO health
          run: |
            for i in {1..30}; do
              curl -fsS http://localhost:9000/minio/health/live && exit 0
              sleep 2
            done
            echo "MinIO did not become healthy in time??"
            exit 1
      
        - name: Run tests
          run: npx playwright test -c tests/playwright.config.js
          env:
            CI: true
      
        - name: Cleanup
          if: always()
          run: docker rm -f minio || true

        build-and-push:
          name: Build and Push Docker Image
          runs-on: ubuntu-latest
          needs: test
      
          steps:
            - name: Checkout code
              uses: actions/checkout@v6
      
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4
      
            - name: Extract metadata
              id: meta
              run: |
                echo "REPO_NAME=${GITHUB_REPOSITORY##*/}" >> "$GITHUB_OUTPUT"
                echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      
            - name: Log in to Docker Hub
              uses: docker/login-action@v4
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}
      
            - name: Build and push multi-arch production image
              uses: docker/build-push-action@v7
              with:
                context: .
                target: prod
                push: true
                platforms: linux/amd64,linux/arm64
                tags: |
                  ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKERHUB_PROJECT_NAME }}:latest
                  ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKERHUB_PROJECT_NAME }}:${{ steps.meta.outputs.SHORT_SHA }}
