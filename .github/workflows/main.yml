name: CI/CD and Node.js Application with Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: run playwright
    runs-on: alpine-latest

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: hi-postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASS }}
        options: >-
          --health-cmd "pg_isready -U postgres -d hi-postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:8.4
        options: >-
          --health-cmd "redis-cli ping || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 -p 9001:9001 \
            -e MINIO_ROOT_USER="${{ secrets.MINIO_ROOT_USER }}" \
            -e MINIO_ROOT_PASSWORD="${{ secrets.MINIO_ROOT_PASSWORD }}" \
            minio/minio:latest server /data --console-address ":9001"

      - name: Wait for MinIO health
        run: |
          for i in {1..30}; do
            curl -fsS http://localhost:9000/minio/health/live && exit 0
            sleep 2
          done
          echo "MinIO did not become healthy in time"
          exit 1

      - name: Run tests
        env:
          CI: true
        run: |
          npx playwright install --with-deps
          npx playwright test -c tests/playwright.config.js

      - name: Cleanup
        if: always()
        run: docker rm -f minio || true

  build-and-push:
    name: Build and Push Docker Image
    runs-on: alpine-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build app and worker with compose
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASS }}
          MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
          MINIO_PUBLIC_URL: http://localhost:9000
        run: docker compose -f docker-compose.yml build app worker --no-cache

      - name: Push images to Docker Hub
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: docker compose -f docker-compose.yml push app worker
